  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f4f6fa;
      --bg2: #e4e9f4;
      --ink: #0a0f1e;
      --ink2: #3a4a6b;
      --accent: #2457e8;
      --rule: #c4cedf;
      --serif: 'DM Serif Display', Georgia, serif;
      --sans: 'DM Sans', system-ui, sans-serif;
      --max: 740px;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--sans);
      font-weight: 300;
      font-size: 17px;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ANIMATED BG ORBS */
    .orbs { position: fixed; inset: 0; z-index: -1; pointer-events: none; overflow: hidden; }
    .orb {
      position: absolute; border-radius: 50%; filter: blur(80px);
      opacity: 0.55; mix-blend-mode: multiply; will-change: transform;
    }
    .orb-1 { width: 520px; height: 520px; top: -120px; left: -140px;
      background: radial-gradient(circle, #a9c2ff 0%, #a9c2ff00 70%);
      animation: float1 18s ease-in-out infinite; }
    .orb-2 { width: 460px; height: 460px; top: 10vh; right: -160px;
      background: radial-gradient(circle, #c6d4ff 0%, #c6d4ff00 70%);
      animation: float2 22s ease-in-out infinite; }
    .orb-3 { width: 380px; height: 380px; top: 55vh; left: 20vw;
      background: radial-gradient(circle, #dbe6ff 0%, #dbe6ff00 70%);
      animation: float3 26s ease-in-out infinite; }
    @keyframes float1 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(140px, 90px) scale(1.15); }
    }
    @keyframes float2 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(-120px, 140px) scale(1.1); }
    }
    @keyframes float3 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(80px, -110px) scale(0.9); }
    }

    /* GRID PATTERN — subtle */
    .grid-bg {
      position: fixed; inset: 0; z-index: -1; pointer-events: none;
      background-image:
        linear-gradient(to right, rgba(10,15,30,0.035) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(10,15,30,0.035) 1px, transparent 1px);
      background-size: 56px 56px;
      mask-image: radial-gradient(ellipse at 50% 30%, #000 30%, transparent 75%);
      -webkit-mask-image: radial-gradient(ellipse at 50% 30%, #000 30%, transparent 75%);
    }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; justify-content: space-between; align-items: center;
      padding: 24px 48px;
      background: var(--bg);
      border-bottom: 1px solid transparent;
      transition: border-color 0.3s;
    }
    nav.scrolled { border-color: var(--rule); }
    .nav-logo {
      font-family: var(--serif);
      font-size: 18px;
      letter-spacing: -0.01em;
      color: var(--ink);
      text-decoration: none;
    }
    .nav-links { display: flex; gap: 36px; list-style: none; }
    .nav-links a {
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink2);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--ink); }

    section { max-width: var(--max); margin: 0 auto; padding: 0 24px; }

    /* HERO */
    .hero {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 0.85fr 1.15fr;
      align-items: center;
      gap: 56px;
      padding-top: 80px;
      max-width: 1180px; margin: 0 auto; padding-left: 32px; padding-right: 32px;
      position: relative;
    }
    .hero-left { display: flex; flex-direction: column; }
    .hero-right { display: flex; flex-direction: column; gap: 12px; }
    .hero-eyebrow {
      font-size: 11px; font-weight: 500; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--accent);
      margin-bottom: 12px;
    }
    .hero-name {
      font-family: var(--serif);
      font-size: clamp(42px, 6vw, 68px);
      line-height: 1.05;
      letter-spacing: -0.02em;
      color: var(--ink);
      margin-bottom: 16px;
    }
    .hero-name em { font-style: italic; color: var(--accent); }
    .hero-tagline {
      font-size: 16px; color: var(--ink2); font-weight: 400;
      max-width: 480px; line-height: 1.6; margin-bottom: 24px;
    }
    .hero-links { display: flex; gap: 24px; align-items: center; flex-wrap: wrap; }
    .hero-links a {
      font-size: 13px; font-weight: 500; letter-spacing: 0.06em;
      text-decoration: none; color: var(--ink2);
      transition: color 0.2s;
    }
    .hero-links a:hover { color: var(--accent); }
    .hero-links .dot { color: var(--rule); }
    .scroll-hint {
      margin-top: 32px; display: flex; align-items: center; gap: 12px;
      color: var(--ink2); font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase;
    }
    .scroll-line { width: 40px; height: 1px; background: var(--rule); }

    /* DIVIDER */
    .divider { max-width: var(--max); margin: 0 auto; padding: 0 24px; }
    .divider hr { border: none; border-top: 1px solid var(--rule); margin: 40px 0; }

    /* SECTION HEADER */
    .section-label {
      font-size: 11px; font-weight: 500; letter-spacing: 0.16em;
      text-transform: uppercase; color: var(--accent);
      margin-bottom: 20px;
      display: flex; align-items: center; gap: 16px;
    }
    .section-label::after {
      content: ''; flex: 1; height: 1px; background: var(--rule); max-width: 80px;
    }

    /* ABOUT */
    .about-text {
      font-family: var(--serif); font-size: 22px; line-height: 1.5;
      letter-spacing: -0.01em; color: var(--ink);
      margin-bottom: 24px; max-width: 600px;
    }
    .stats {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 2px; border: 1px solid var(--rule); border-radius: 2px;
      overflow: hidden;
    }
    .stat {
      padding: 22px 24px; background: var(--bg);
      border-right: 1px solid var(--rule);
      transition: background 0.25s ease;
      position: relative; overflow: hidden;
    }
    .stat:hover { background: rgba(36,87,232,0.05); }
    .stat::after {
      content: ''; position: absolute; left: 0; bottom: 0; height: 2px;
      width: 0%; background: var(--accent); transition: width 0.5s ease;
    }
    .stat:hover::after { width: 100%; }
    .stat:last-child { border-right: none; }
    .stat-num {
      font-family: var(--serif); font-size: 28px;
      color: var(--ink); letter-spacing: -0.02em; line-height: 1;
      margin-bottom: 6px;
    }
    .stat-label { font-size: 12px; color: var(--ink2); line-height: 1.4; }

    /* EXPERIENCE */
    .exp-list { display: flex; flex-direction: column; gap: 0; }
    .exp-item {
      display: grid; grid-template-columns: 110px 1fr;
      gap: 20px; padding: 18px 16px;
      border-bottom: 1px solid var(--rule);
      border-radius: 6px;
      transition: background 0.25s ease, transform 0.25s ease;
    }
    .exp-item:hover { background: rgba(36,87,232,0.04); transform: translateX(4px); }
    .exp-item:hover .exp-role { color: var(--accent); }
    .exp-item .exp-role { transition: color 0.25s ease; }
    .exp-item:first-child { border-top: 1px solid var(--rule); }
    .exp-date { font-size: 12px; color: var(--ink2); padding-top: 3px; line-height: 1.5; }
    .exp-role { font-family: var(--serif); font-size: 20px; line-height: 1.2; margin-bottom: 4px; }
    .exp-company { font-size: 13px; color: var(--accent); font-weight: 500; margin-bottom: 10px; }
    .exp-desc { font-size: 14px; color: var(--ink2); line-height: 1.6; margin-bottom: 8px; }
    .exp-tags { display: flex; gap: 6px; flex-wrap: wrap; }
    .exp-tag {
      font-size: 11px; padding: 3px 9px; border-radius: 100px;
      border: 1px solid var(--rule); color: var(--ink2); letter-spacing: 0.06em;
    }

    /* PROJECTS */
    .proj-grid { display: flex; flex-direction: column; gap: 0; }
    .proj-item {
      display: grid; grid-template-columns: 1fr auto;
      align-items: start;
      padding: 18px 16px;
      border-bottom: 1px solid var(--rule);
      gap: 20px;
      border-radius: 6px;
      transition: background 0.25s ease, transform 0.25s ease, box-shadow 0.25s ease;
      cursor: default;
    }
    .proj-item:hover {
      background: rgba(36,87,232,0.04);
      transform: translateX(4px);
    }
    .proj-item:hover .proj-title { color: var(--accent); }
    .proj-item:hover .proj-tag { border-color: var(--accent); color: var(--accent); }
    .proj-item .proj-title { transition: color 0.25s ease; }
    .proj-item .proj-tag { transition: border-color 0.25s ease, color 0.25s ease; }
    .proj-item:first-child { border-top: 1px solid var(--rule); }
    .proj-num { font-size: 11px; color: var(--ink2); font-weight: 500; margin-bottom: 6px; }
    .proj-title { font-family: var(--serif); font-size: 19px; margin-bottom: 6px; line-height: 1.2; }
    .proj-desc { font-size: 14px; color: var(--ink2); line-height: 1.55; max-width: 480px; }
    .proj-tag {
      font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--ink2); border: 1px solid var(--rule);
      padding: 4px 10px; border-radius: 100px; white-space: nowrap; align-self: center;
    }

    /* SKILLS */
    .skills-list { display: flex; flex-direction: column; gap: 0; }
    .skills-row {
      display: grid; grid-template-columns: 120px 1fr;
      gap: 20px; padding: 12px 0;
      border-bottom: 1px solid var(--rule);
      align-items: baseline;
    }
    .skills-row:first-child { border-top: 1px solid var(--rule); }
    .skills-label {
      font-size: 11px; font-weight: 500; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--ink2);
    }
    .skills-items { font-size: 14px; color: var(--ink); line-height: 1.6; }

    /* FOCUS AREAS */
    .focus-list { list-style: none; display: flex; flex-direction: column; gap: 0; }
    .focus-item {
      padding: 12px 0; border-bottom: 1px solid var(--rule);
      font-size: 15px; color: var(--ink);
      display: flex; align-items: center; gap: 12px;
    }
    .focus-item:first-child { border-top: 1px solid var(--rule); }
    .focus-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }

    /* CONTACT */
    .contact-heading {
      font-family: var(--serif); font-size: clamp(32px, 5vw, 52px);
      line-height: 1.1; letter-spacing: -0.02em; margin-bottom: 36px;
    }
    .contact-heading em { font-style: italic; color: var(--accent); }
    .contact-links { display: flex; flex-direction: column; gap: 0; }
    .contact-link {
      display: flex; align-items: center; gap: 16px;
      text-decoration: none; color: var(--ink);
      font-size: 15px; transition: color 0.2s;
      padding: 12px 0; border-bottom: 1px solid var(--rule);
    }
    .contact-link:first-child { border-top: 1px solid var(--rule); }
    .contact-link:hover { color: var(--accent); }
    .contact-link-label { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink2); width: 80px; flex-shrink: 0; }
    .contact-link-value { font-family: var(--serif); font-size: 19px; }

    /* FOOTER */
    .footer {
      max-width: var(--max); margin: 0 auto; padding: 48px 24px 80px;
      display: flex; justify-content: space-between; align-items: center;
      font-size: 12px; color: var(--ink2);
    }

    /* CHAT */
    .chat-embed {
      border: 1px solid var(--rule); border-radius: 16px; overflow: hidden;
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      box-shadow: 0 20px 48px -24px rgba(36,87,232,0.18), 0 2px 4px rgba(10,15,30,0.04);
      transition: box-shadow 0.3s ease, transform 0.3s ease;
    }
    .chat-embed:hover {
      box-shadow: 0 28px 64px -24px rgba(36,87,232,0.28), 0 2px 4px rgba(10,15,30,0.06);
      transform: translateY(-2px);
    }
    .chat-messages {
      height: 460px; overflow-y: auto; padding: 28px;
      display: flex; flex-direction: column; gap: 18px;
    }
    .chat-bubble { max-width: 88%; font-size: 15px; line-height: 1.6; }
    .chat-bubble.assistant { align-self: flex-start; color: var(--ink); }
    .chat-bubble.assistant .bubble-inner {
      background: var(--bg2); padding: 12px 16px; border-radius: 2px 14px 14px 14px;
      white-space: pre-wrap;
    }
    .chat-bubble.user { align-self: flex-end; }
    .chat-bubble.user .bubble-inner {
      background: var(--accent); color: #fff;
      padding: 12px 16px; border-radius: 14px 2px 14px 14px;
      white-space: pre-wrap;
    }
    .chat-chips { padding: 0 20px 14px; display: flex; flex-wrap: wrap; gap: 8px; }
    .chat-chip {
      font-size: 12px; padding: 6px 14px; border-radius: 100px;
      border: 1px solid var(--rule); background: var(--bg);
      color: var(--ink2); cursor: pointer; transition: all 0.2s;
      font-family: var(--sans); white-space: nowrap;
    }
    .chat-chip:hover { border-color: var(--accent); color: var(--accent); }
    .chat-input-row {
      padding: 14px 20px 20px; border-top: 1px solid var(--rule);
      display: flex; gap: 10px; align-items: flex-end;
    }
    .chat-textarea {
      flex: 1; font-family: var(--sans); font-size: 14px; font-weight: 300;
      background: var(--bg2); border: 1px solid var(--rule); border-radius: 8px;
      padding: 11px 14px; resize: none; color: var(--ink); line-height: 1.5;
      outline: none; transition: border-color 0.2s; min-height: 42px; max-height: 120px;
    }
    .chat-textarea:focus { border-color: var(--accent); }
    .chat-send {
      background: var(--accent); color: #fff; border: none; border-radius: 8px;
      width: 42px; height: 42px; cursor: pointer; font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: opacity 0.2s;
    }
    .chat-send:hover { opacity: 0.85; }
    .chat-send:disabled { opacity: 0.35; cursor: not-allowed; }
    .typing-dot {
      display: inline-block; width: 6px; height: 6px; border-radius: 50%;
      background: var(--ink2); animation: typing 1.2s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typing { 0%, 80%, 100% { opacity: 0.2; } 40% { opacity: 1; } }

    /* FADE IN */
    .fade-in { opacity: 0; transform: translateY(18px); transition: opacity 0.7s ease, transform 0.7s ease; }
    .fade-in.visible { opacity: 1; transform: translateY(0); }

    @media (max-width: 720px) {
      nav { padding: 20px 24px; }
      .nav-links { display: none; }
      .stats { grid-template-columns: 1fr; }
      .stat { border-right: none; border-bottom: 1px solid var(--rule); }
      .stat:last-child { border-bottom: none; }
      .hero { grid-template-columns: 1fr; min-height: auto; padding-top: 100px; padding-bottom: 40px; }
      .exp-item { grid-template-columns: 1fr; gap: 4px; }
      .skills-row { grid-template-columns: 1fr; gap: 4px; }
    }
  </style>
</head>
<body>

<div id="root"></div>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useRef } = React;

// ── DATA ────────────────────────────────────────────────────────────────
const TAGLINE = "Software Engineer at Meta — drawn to 0→1, agentic AI, and shipping fast.";

const EXPERIENCE = [
  {
    date: "Jun 2022 — Now",
    role: "Software Engineer",
    company: "Meta",
    desc: "Built a 0→1 scalable platform saving 3000+ hours/year. Shipped agentic AI for self-serve analytics (40% faster decisions). Cut API latency 8s → 200ms org-wide. Co-built an Airflow-like ETL framework powering 220+ pipelines at 99.9% uptime. Added ML-based SEV detection.",
    tags: ["GenAI", "Agentic AI", "Python", "ETL", "Performance"]
  },
  {
    date: "Feb 2021 — Dec 2021",
    role: "Software Engineer Intern",
    company: "Intel Corporation",
    desc: "Built a multi-processing test-execution app (~40% faster). Restructured failure-logging into cluster groups. Partnered with XFN teams on an automation framework. Automated the CI/CD pipeline for regression testing (+35% productivity).",
    tags: ["Python", "CI/CD", "Automation", "Testing"]
  },
  {
    date: "Jul 2018 — Apr 2019",
    role: "Software Engineer",
    company: "Turabit Solution Pvt. Ltd.",
    desc: "Built a conversational AI chatbot automating IT services (80% task reduction). Secure REST APIs for cross-platform integration (+40% efficiency). Integrated Stripe pay-as-you-go in a chatbot-builder web app. Redesigned DB architecture (backup, storage, security).",
    tags: ["AI Chatbot", "REST APIs", "Stripe", "DB Design"]
  },
  {
    date: "Jan 2018 — Jul 2018",
    role: "Software Engineer Intern",
    company: "ConceptServe Technologies",
    desc: "Built a scalable MVC-based social media app with CRUD for posts, comments, and groups. Integrated OTP-based 2FA with email verification for stronger account security.",
    tags: ["MVC", "2FA", "Full-stack"]
  }
];

const PROJECTS = [
  {
    num: "01",
    title: "Retrieval-Augmented Generation (RAG) System",
    desc: "End-to-end RAG pipeline with chunking, embeddings, and hybrid retrieval (FAISS + ElasticSearch) — 92% precision, 88% recall on 50K+ docs. Cross-encoder reranker + BLEU eval lifted accuracy to 95% and cut hallucinations ~30%. Flask API with <300ms retrieval latency.",
    tag: "GenAI / RAG"
  },
  {
    num: "02",
    title: "Stock Market WebApp",
    desc: "RESTful APIs serving 8,000+ companies' stock data with DynamoDB storage and real-time candlestick charts.",
    tag: "APIs / Data"
  },
  {
    num: "03",
    title: "Network Intrusion Detection",
    desc: "Binary classification (LR, KNN, SVM, NN) to distinguish good vs. bad connections. One-hot encoding to balance train/test; correlation pruning (threshold 0.9) to avoid overfitting.",
    tag: "ML / Security"
  },
  {
    num: "04",
    title: "House Price Estimation",
    desc: "End-to-end predictive model for housing prices — 92% R² via feature scaling, one-hot encoding, and cross-validation.",
    tag: "ML / Regression"
  }
];

const SKILLS = [
  { label: "Languages", items: "Python · Java · Go · TypeScript · Rust · Kotlin · Node.js" },
  { label: "AI / ML",   items: "GenAI · Agentic Systems · RAG · Embeddings · Vector Retrieval · Machine Learning" },
  { label: "Backend",   items: "Django · Flask · Next.js · React · GraphQL · REST · gRPC · Tailwind" },
  { label: "Data",      items: "PostgreSQL · MongoDB · Redis · EntQL · FAISS · ElasticSearch" },
  { label: "Cloud",     items: "AWS (EC2, S3, Lambda) · Azure · Docker · Kubernetes · Jenkins · Git" },
];

const FOCUS = [
  "AI-driven analytics and self-serve insights",
  "0→1 platforms and developer velocity",
  "Performance optimization and automation at scale"
];

// ── EMBEDDED CHAT ────────────────────────────────────────────────────────
function EmbeddedChat() {
  const [messages, setMessages] = useState([
    { role: 'assistant', content: "Hi — I'm an AI trained on Moksh's work. Ask me anything about his experience, projects, or approach." }
  ]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const messagesRef = useRef(null);

  useEffect(() => {
    if (messagesRef.current) {
      messagesRef.current.scrollTop = messagesRef.current.scrollHeight;
    }
  }, [messages, loading]);

  const send = async (text) => {
    const msg = (text || input).trim();
    if (!msg || loading) return;
    setInput('');
    setMessages(m => [...m, { role: 'user', content: msg }]);
    setLoading(true);
    try {
      const res = await fetch('/api/ask', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question: msg })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
      setMessages(m => [...m, { role: 'assistant', content: data.response }]);
    } catch (e) {
      setMessages(m => [...m, { role: 'assistant', content: "Something went wrong reaching the AI service. Try again in a moment, or reach out at shahmoksh996@gmail.com." }]);
    }
    setLoading(false);
  };

  const handleKey = (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  };

  const chips = ["Top projects", "AI/ML focus", "Work at Meta", "How to reach out"];

  return (
    <div className="chat-embed">
      <div className="chat-messages" ref={messagesRef}>
        {messages.map((m, i) => (
          <div key={i} className={`chat-bubble ${m.role}`}>
            <div className="bubble-inner">{m.content}</div>
          </div>
        ))}
        {loading && (
          <div className="chat-bubble assistant">
            <div className="bubble-inner" style={{display:'flex',gap:5,alignItems:'center',minHeight:20}}>
              <span className="typing-dot"></span>
              <span className="typing-dot"></span>
              <span className="typing-dot"></span>
            </div>
          </div>
        )}
      </div>

      {messages.length < 3 && (
        <div className="chat-chips">
          {chips.map(c => (
            <button key={c} className="chat-chip" onClick={() => send(c)}>{c}</button>
          ))}
        </div>
      )}

      <div className="chat-input-row">
        <textarea
          className="chat-textarea"
          placeholder="Ask about experience, projects, skills…"
          value={input}
          onChange={e => setInput(e.target.value)}
          onKeyDown={handleKey}
          rows={1}
        />
        <button className="chat-send" onClick={() => send()} disabled={!input.trim() || loading}>↑</button>
      </div>
    </div>
  );
}

// ── ANIMATED COUNTER ──────────────────────────────────────────────────────
function Counter({ target, suffix = "", duration = 1400 }) {
  const [val, setVal] = useState(0);
  const ref = useRef(null);
  const done = useRef(false);

  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting && !done.current) {
          done.current = true;
          const start = performance.now();
          const step = (t) => {
            const p = Math.min(1, (t - start) / duration);
            const eased = 1 - Math.pow(1 - p, 3);
            setVal(Math.round(eased * target));
            if (p < 1) requestAnimationFrame(step);
          };
          requestAnimationFrame(step);
        }
      });
    }, { threshold: 0.4 });
    obs.observe(el);
    return () => obs.disconnect();
  }, [target, duration]);

  return <span ref={ref}>{val.toLocaleString()}{suffix}</span>;
}
